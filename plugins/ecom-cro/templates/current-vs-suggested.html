<!--
  current-vs-suggested.html — element-level redesign comparison (popup, banner, single module).

  One toggle at top: Current (client today) / Suggested (your redesign).
  Stacked vertically: Desktop view, then Mobile view. Both views update together.

  Placeholders to replace:
    {{CLIENT_WORDMARK}}              FIG LINENS AND HOME
    {{CLIENT_WORDMARK_MOBILE}}        FIG LINENS<br/>AND HOME
    {{CLIENT_URL}}                   figlinensandhome.com
    {{ANNOUNCE_LINE_DESKTOP}}        FREE SHIPPING ON ORDERS OVER $100! · Questions? Email info@figlinens.com
    {{ANNOUNCE_LINE_MOBILE}}         FREE SHIPPING ON ORDERS OVER $100!
    {{CURRENT_DESKTOP_HTML}}          markup for the client's existing element on desktop
    {{SUGGESTED_DESKTOP_HTML}}        markup for the redesigned element on desktop
    {{CURRENT_MOBILE_HTML}}           markup for the client's existing element on mobile
    {{SUGGESTED_MOBILE_HTML}}         markup for the redesigned element on mobile

  Pattern principles baked in:
    - Centered modal on mobile, NOT bottom sheet (older audience reads centered as 'a clear thing to act on or close'; bottom sheets create dismissal uncertainty).
    - Serif headline (Times New Roman / Georgia), sans-serif body — luxury-tier convention.
    - Single navy CTA, full-width.
    - Trust line optional — see skills/popup-copy/SKILL.md for principles.
    - Image strip ~62-180px tall on mobile/desktop respectively, lifestyle gradient acceptable as placeholder.
    - Page chrome shows wordmark + announcement bar so the redesign reads in context, not floating in void.
-->

<style>
.ep { font-family: system-ui, -apple-system, sans-serif; max-width: 680px; margin: 0 auto; color: var(--color-text-primary); }
.ep .toggle-row { display: flex; gap: 6px; margin-bottom: 0.75rem; justify-content: center; }
.ep .tg { padding: 8px 18px; border: 0.5px solid var(--color-border-tertiary); background: var(--color-background-primary); font-size: 13px; cursor: pointer; border-radius: var(--border-radius-md); color: var(--color-text-primary); }
.ep .tg.on { background: #1F2A44; color: #fff; border-color: #1F2A44; }
.ep .view-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--color-text-tertiary); margin: 14px 0 6px; text-align: center; }

/* Desktop frame */
.ep .desktop-wrap { background: var(--color-background-secondary); padding: 12px; border-radius: var(--border-radius-md); }
.ep .desktop { width: 100%; aspect-ratio: 16/10; position: relative; background: #fff; overflow: hidden; border: 0.5px solid var(--color-border-tertiary); }
.ep .ann-d { background: #b8d2bd; color: #8a1d1d; text-align: center; font-size: 11px; font-weight: 600; padding: 6px; }
.ep .page-chrome { height: 50px; background: #fff; border-bottom: 1px solid #e5e5e5; display: flex; align-items: center; justify-content: center; }
.ep .wm-d { font-family: 'Times New Roman', serif; font-size: 22px; letter-spacing: 1.5px; color: #1a1a1a; }
.ep .page-hero-d { position: absolute; top: 84px; left: 0; right: 0; bottom: 0; background: linear-gradient(135deg,#e8dfd2 0%,#a89876 100%); }
.ep .scrim-d { position: absolute; inset: 0; background: rgba(20,20,20,0.42); display: flex; align-items: center; justify-content: center; }

/* Mobile phone frame */
.ep .mobile-wrap { display: flex; justify-content: center; padding: 12px; background: var(--color-background-secondary); border-radius: var(--border-radius-md); }
.ep .phone { width: 270px; height: 540px; background: #fff; border: 8px solid #2a2a2a; position: relative; overflow: hidden; }
.ep .browser { height: 26px; background: #f3f3f3; border-bottom: 1px solid #e5e5e5; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #666; }
.ep .ann-m { background: #b8d2bd; color: #8a1d1d; text-align: center; font-size: 8px; font-weight: 600; padding: 4px; }
.ep .hdr-m { height: 54px; background: #fff; border-bottom: 1px solid #e5e5e5; display: flex; align-items: center; justify-content: center; }
.ep .wm-m { font-family: 'Times New Roman', serif; font-size: 13px; letter-spacing: 1px; text-align: center; line-height: 1.05; }
.ep .phone-page { position: absolute; top: 26px; left: 0; right: 0; bottom: 0; background: #fff; }
.ep .page-hero-m { position: absolute; top: 78px; left: 0; right: 0; bottom: 0; background: linear-gradient(135deg,#e8dfd2 0%,#a89876 100%); }
.ep .phone-scrim { position: absolute; top: 26px; left: 0; right: 0; bottom: 0; background: rgba(20,20,20,0.42); display: flex; align-items: center; justify-content: center; }

/* Element-specific styles — replace with the element you're comparing.
   Example: popup styles. See uploads/fig_linens_single_atc.html or
   outputs/<client>/widget snapshots for working examples. */
.ep .pop-suggested { width: 480px; max-width: 92%; background: #fff; display: flex; box-shadow: 0 12px 40px rgba(0,0,0,0.22); position: relative; }
.ep .pop-suggested .img { flex: 0 0 180px; background: linear-gradient(135deg,#e0d4c1 0%,#8a7256 100%); }
.ep .pop-suggested .content { flex: 1; padding: 30px 32px 26px; text-align: center; }
.ep .pop-suggested .x { position: absolute; top: 12px; right: 14px; color: #555; font-size: 18px; cursor: pointer; }
.ep .pop-suggested .ey { font-size: 10px; letter-spacing: 0.18em; color: #888; text-transform: uppercase; margin-bottom: 12px; }
.ep .pop-suggested .h { font-family: 'Times New Roman', Georgia, serif; font-size: 26px; line-height: 1.18; color: #1a1a1a; margin-bottom: 12px; letter-spacing: 0.3px; }
.ep .pop-suggested .body { font-size: 13px; line-height: 1.55; color: #555; margin-bottom: 18px; }
.ep .pop-suggested input { width: 100%; padding: 11px 12px; font-size: 13px; border: 1px solid #c0bcb3; border-radius: 0; box-sizing: border-box; margin-bottom: 8px; background: #fff; color: #1a1a1a; }
.ep .pop-suggested .btn { width: 100%; padding: 12px; background: #1F2A44; color: #fff; font-size: 12px; font-weight: 600; letter-spacing: 0.08em; text-align: center; cursor: pointer; }

.ep .mob-suggested { width: 220px; background: #fff; box-shadow: 0 8px 28px rgba(0,0,0,0.22); position: relative; }
.ep .mob-suggested .x { position: absolute; top: 6px; right: 10px; color: #fff; font-size: 14px; cursor: pointer; z-index: 2; text-shadow: 0 1px 2px rgba(0,0,0,0.3); }
.ep .mob-suggested .img { height: 62px; background: linear-gradient(135deg,#e0d4c1 0%,#8a7256 100%); }
.ep .mob-suggested .content { padding: 14px 18px 18px; text-align: center; }
.ep .mob-suggested .ey { font-size: 7.5px; letter-spacing: 0.16em; color: #888; text-transform: uppercase; margin-bottom: 8px; }
.ep .mob-suggested .h { font-family: 'Times New Roman', Georgia, serif; font-size: 18px; line-height: 1.15; color: #1a1a1a; margin-bottom: 8px; letter-spacing: 0.3px; }
.ep .mob-suggested .body { font-size: 10.5px; line-height: 1.45; color: #555; margin-bottom: 13px; }
.ep .mob-suggested input { width: 100%; padding: 8px 10px; font-size: 11px; border: 1px solid #c0bcb3; box-sizing: border-box; margin-bottom: 6px; background: #fff; color: #1a1a1a; }
.ep .mob-suggested .btn { width: 100%; padding: 9px; background: #1F2A44; color: #fff; font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-align: center; }
.sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }
</style>

<h2 class="sr-only">{{ELEMENT_NAME}} redesign — current vs suggested, desktop and mobile.</h2>

<div class="ep">
  <div class="toggle-row">
    <div class="tg" data-st="current">Current ({{CLIENT_SHORT_NAME}} today)</div>
    <div class="tg on" data-st="suggested">Suggested redesign</div>
  </div>

  <div class="view-label">Desktop</div>
  <div class="desktop-wrap">
    <div class="desktop">
      <div class="ann-d">{{ANNOUNCE_LINE_DESKTOP}}</div>
      <div class="page-chrome"><div class="wm-d">{{CLIENT_WORDMARK}}</div></div>
      <div class="page-hero-d"></div>
      <div class="scrim-d" id="d-scrim"></div>
    </div>
  </div>

  <div class="view-label">Mobile</div>
  <div class="mobile-wrap">
    <div class="phone">
      <div class="browser">{{CLIENT_URL}}</div>
      <div class="phone-page">
        <div class="ann-m">{{ANNOUNCE_LINE_MOBILE}}</div>
        <div class="hdr-m"><div class="wm-m">{{CLIENT_WORDMARK_MOBILE}}</div></div>
        <div class="page-hero-m"></div>
      </div>
      <div class="phone-scrim" id="m-scrim"></div>
    </div>
  </div>
</div>

<script>
(function(){
  var state = 'suggested';
  var currentDesktop  = '{{CURRENT_DESKTOP_HTML}}';
  var suggestedDesktop = '{{SUGGESTED_DESKTOP_HTML}}';
  var currentMobile   = '{{CURRENT_MOBILE_HTML}}';
  var suggestedMobile  = '{{SUGGESTED_MOBILE_HTML}}';

  function render(){
    var dScrim = document.getElementById('d-scrim');
    var mScrim = document.getElementById('m-scrim');
    if(state === 'current'){
      dScrim.innerHTML = currentDesktop;
      mScrim.innerHTML = currentMobile;
    } else {
      dScrim.innerHTML = suggestedDesktop;
      mScrim.innerHTML = suggestedMobile;
    }
    document.querySelectorAll('.ep .tg').forEach(function(t){
      t.classList.toggle('on', t.dataset.st === state);
    });
  }

  document.querySelectorAll('.ep .tg').forEach(function(t){
    t.addEventListener('click', function(){ state = t.dataset.st; render(); });
  });

  render();
})();
</script>
